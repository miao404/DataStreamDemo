# Job Config (Can be overwritten by args)
rt.metrics.default.name=app_data_rt_metrics_parser
rt.metrics.num_per_check=1000
rt.metrics.check_interval=1000
rt.metrics.len_per_str=50
rt.metrics.len_range=10
rt.metrics.len_random=false
rt.metrics.source.print=false
rt.metrics.sink.print=false
# App Config for MetricsToPetra
rt.metrics.tags=[job_id,component_id,component_type,tm_id,task_id]
rt.metrics.rocksdb.extra.tags=[column_family]
rt.metrics.extra.tags.map={__ack-count=[host_name];fullRestarts=[host_name];latency=[self-contained]}
rt.metrics.scope.tags.map={JM=[scope];JM_JOB=[scope];TM=[scope];TM_JOB=[scope];TASK=[scope,task_name,subtask_index];OPERATOR=[scope,operator_id,operator_name,subtask_index]}
rt.metrics.output.name.delimiter=.
rt.metrics.output.all=false
rt.metrics.output.petra=false
rt.metrics.filter.display=[uptime,fullRestarts,numRecordsInPerSecond,numRecordsOutPerSecond,Status.JVM.CPU.Load,Status.JVM.Memory.Heap.Used,Status.JVM.Memory.NonHeap.Used,Status.JVM.GarbageCollector.PS_Scavenge.Count,Status.JVM.GarbageCollector.PS_MarkSweep.Count,Status.Network.AvailableMemorySegments,__ack_count,__fail_count,__complete_latency,__execute_count,__execute_latency,uptimeSecs,memory/heap_usedBytes,memory/nonHeap_usedBytes,GC/ParNew_count,GC/ParNew_timeMs,GC/ConcurrentMarkSweep_count,GC/ConcurrentMarkSweep_timeMs,TopicSaverCount_SUM,kafkaOffset_spoutLag,kafkaOffset_latestCompletedOffset,kafkaOffset_latestEmittedOffset,kafkaOffset_latestTimeOffset,kafkaOffset_totalEarliestTimeOffset,kafkaOffset_totalLatestTimeOffset,kafkaOffset_totalLatestEmittedOffset,kafkaOffset_earliestTimeOffset,kafkaOffset_totalSpoutLag,kafkaOffset_totalLatestCompletedOffset,lastCheckpointDuration,lastCheckpointSize,lastCheckpointAlignmentBuffered,numberOfInProgressCheckpoints,numberOfCompletedCheckpoints,numberOfFailedCheckpoints,totalNumberOfCheckpoints,checkpointAlignmentTime]
rt.metrics.filter.user-defined=true
rt.metrics.extractor.type={flink=[uptime,fullRestarts,numRecordsInPerSecond,numRecordsOutPerSecond,Status.JVM.CPU.Load,Status.JVM.CPU.Load,Status.JVM.Memory.Heap.Used,Status.JVM.Memory.NonHeap.Used,Status.JVM.Memory.Heap.Used,Status.JVM.Memory.NonHeap.Used,Status.JVM.GarbageCollector.PS_Scavenge.Count,Status.JVM.GarbageCollector.PS_MarkSweep.Count,Status.Network.AvailableMemorySegments];flink_map_kafka_offset=[KafkaConsumer.current-offsets];storm_single_value=[uptimeSecs];storm_map_sum=[__ack-count,__fail-count,__execute-count];storm_map_avg=[__complete-latency,__execute-latency];storm_map_memory=[memory/nonHeap,memory/heap];storm_map_gc=[GC/ConcurrentMarkSweep,GC/ParNew];storm_map_kafka_offset=[com.meituan.rt.tpframe.shade.kafkaOffset,kafkaOffset]}
rt.metrics.extractor.multi=[storm_map_gc,storm_user_defined,storm_map_kafka_offset,H]